on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    branches:
      - main

name: Continuous Integration

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v3

      - run: yarn pack -o package.tgz

      - uses: actions/upload-artifact@v7
        with:
          path: package.tgz
          archive: false
          if-no-files-found: error
